name: Cypress Tests

on: [push]

jobs:
  cypress-run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        with:
          record: true
        env:
          CYPRESS_RECORD_KEY: ${{ af0f5dee-967b-4129-a983-7daf4d1da6ce}}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}